[package]
name = "stadera"
version = "0.1.0"
edition = "2024"

[workspace]
resolver = "2"
members = ["crates/api"]

[workspace.package]
edition = "2024"
license = "MIT"
repository = "https://github.com/MicheleBellitti/stadera"

[workspace.dependencies]
# qui centralizzeremo le dep condivise in M2+
tokio = { version = "1", features = ["full"] }
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
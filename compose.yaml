services:
  postgres:
    image: postgres:16-alpine
    container_name: stadera-postgres
    environment:
      POSTGRES_USER: stadera
      POSTGRES_PASSWORD: stadera
      POSTGRES_DB: stadera
    ports:
      - "5432:5432"
    volumes:
      - stadera-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stadera -d stadera"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  stadera-pg-data: